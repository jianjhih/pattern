<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <title>Pix Spy Pro - HUD Instrument</title>
        <style>
            body {
                margin: 0;
                background: #050505;
                color: #c0c0c0;
                font-family: Consolas, monospace;
                overflow: hidden;
            }
            header {
                height: 40px;
                background: #121212;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 16px;
                font-size: 12px;
                z-index: 50;
                position: relative;
            }
            .controls {
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .btn {
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: #222;
                color: #fff;
                padding: 4px 10px;
                cursor: pointer;
                font-size: 10px;
                transition: background 0.2s;
            }
            .btn:hover {
                background: #333;
            }
            input[type="number"],
            input[type="text"] {
                background: #000;
                border: 1px solid #444;
                color: #3b82f6;
                font-size: 11px;
                padding: 2px 4px;
                outline: none;
                text-align: center;
            }
            .main {
                width: 100%;
                height: calc(100vh - 40px);
                background-color: #080808;
                background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
                background-size: 40px 40px;
                position: relative;
            }
            canvas {
                background: #000;
                image-rendering: pixelated;
            }
        </style>
    </head>

    <body>
        <header>
            <div class="controls">
                <b style="color: #3b82f6; margin-right: 10px">PIXSPY</b>
                <input
                    type="file"
                    id="file"
                    style="display: none"
                    accept="image/*"
                />
                <label class="btn" for="file">Import Image</label>
                <span style="margin-left: 10px; opacity: 0.5">Jump:</span>
                <input
                    id="jumpX"
                    type="number"
                    placeholder="X"
                    style="width: 50px"
                />
                <input
                    id="jumpY"
                    type="number"
                    placeholder="Y"
                    style="width: 50px"
                />
                <button class="btn" onclick="jumpTo()">Go</button>
                <span style="margin-left: 10px; opacity: 0.5">Scale:</span>
                <input id="scaleInput" type="text" style="width: 50px" />
                <span style="margin-left: -5px; opacity: 0.5">%</span>
                <button class="btn" onclick="setScale()">Set</button>
            </div>
            <div id="info">Waiting for image...</div>
        </header>

        <div class="main" id="container">
            <canvas id="canvas"></canvas>
        </div>

        <script>
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const container = document.getElementById("container");
            const fileInput = document.getElementById("file");
            const info = document.getElementById("info");
            const scaleInput = document.getElementById("scaleInput");

            let img = new Image();
            let loaded = false;
            let isInside = false;
            let scale = 1;
            let view = { x: 0, y: 0 };
            let hover = { x: 0, y: 0 };
            let color = { r: 0, g: 0, b: 0 };
            let dragging = false;
            let last = { x: 0, y: 0 };
            const keys = {};

            // 鍵盤控制變數
            let repeatTimer = null;
            let initialDelayTimer = null;

            function resize() {
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                if (loaded) render();
            }
            window.addEventListener("resize", resize);
            resize();

            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    img.onload = () => {
                        loaded = true;
                        scale = Math.min(
                            canvas.width / img.width,
                            canvas.height / img.height,
                            1,
                        );
                        view.x = img.width / 2;
                        view.y = img.height / 2;
                        render();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            function jumpTo() {
                if (!loaded) return;
                const jx = parseInt(document.getElementById("jumpX").value);
                const jy = parseInt(document.getElementById("jumpY").value);
                if (!isNaN(jx)) {
                    hover.x = jx;
                    view.x = jx;
                }
                if (!isNaN(jy)) {
                    hover.y = jy;
                    view.y = jy;
                }
                updatePixel();
                render();
            }

            function setScale() {
                if (!loaded) return;
                let val = scaleInput.value.replace("%", "");
                let newScale = parseFloat(val);
                if (!isNaN(newScale) && newScale > 0) {
                    scale = newScale / 100;
                    render();
                }
            }

            scaleInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") setScale();
            });

            container.onwheel = (e) => {
                if (!loaded) return;
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.8 : 1.25;
                const oldScale = scale;
                scale = Math.max(0.01, Math.min(1000, scale * factor));
                const mx = e.clientX;
                const my = e.clientY - 40;
                view.x +=
                    (mx - canvas.width / 2) / oldScale -
                    (mx - canvas.width / 2) / scale;
                view.y +=
                    (my - canvas.height / 2) / oldScale -
                    (my - canvas.height / 2) / scale;
                render();
            };

            container.onmousedown = (e) => {
                if (!loaded || e.button !== 0) return;
                dragging = true;
                last = { x: e.clientX, y: e.clientY };
            };
            window.onmouseup = () => (dragging = false);

            container.onmousemove = (e) => {
                if (!loaded) return;
                const mx = e.clientX,
                    my = e.clientY - 40;
                if (dragging) {
                    view.x -= (mx - last.x) / scale;
                    view.y -= (my - last.y) / scale;
                    last = { x: mx, y: my };
                }
                hover.x = view.x + (mx - canvas.width / 2) / scale;
                hover.y = view.y + (my - canvas.height / 2) / scale;
                updatePixel();
                render();
            };

            container.onmouseleave = () => {
                isInside = false;
                render();
            };

            function updatePixel() {
                const ix = Math.floor(hover.x),
                    iy = Math.floor(hover.y);
                if (ix < 0 || iy < 0 || ix >= img.width || iy >= img.height) {
                    isInside = false;
                    return;
                }
                isInside = true;
                const off = new OffscreenCanvas(1, 1);
                const octx = off.getContext("2d");
                octx.drawImage(img, -ix, -iy);
                const p = octx.getImageData(0, 0, 1, 1).data;
                color.r = p[0];
                color.g = p[1];
                color.b = p[2];
            }

            function render() {
                if (!loaded) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const dx = canvas.width / 2 - view.x * scale,
                    dy = canvas.height / 2 - view.y * scale;
                ctx.drawImage(
                    img,
                    dx,
                    dy,
                    img.width * scale,
                    img.height * scale,
                );

                if (isInside) {
                    const ix = Math.floor(hover.x),
                        iy = Math.floor(hover.y);
                    const sx = canvas.width / 2 + (ix - view.x) * scale;
                    const sy = canvas.height / 2 + (iy - view.y) * scale;

                    ctx.save();
                    ctx.globalCompositeOperation = "difference";
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(sx + 0.5, 0, scale - 1, canvas.height);
                    ctx.strokeRect(0, sy + 0.5, canvas.width, scale - 1);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 12px Consolas";
                    ctx.fillText(`X:${ix} Y:${iy}`, sx + scale + 10, sy - 10);
                    ctx.fillText(
                        `R:${color.r} G:${color.g} B:${color.b}`,
                        sx + scale + 10,
                        sy + scale + 15,
                    );
                    ctx.restore();
                    container.style.cursor = "none";
                } else {
                    container.style.cursor = "default";
                }

                const currentPercent = Math.round(scale * 100);
                info.innerText = `Res: ${img.width}x${img.height} | Scale: ${currentPercent}%`;
                if (document.activeElement !== scaleInput)
                    scaleInput.value = currentPercent;
            }

            function movePixel() {
                let dx = 0,
                    dy = 0;
                if (keys["ArrowLeft"]) dx = -1;
                if (keys["ArrowRight"]) dx = 1;
                if (keys["ArrowUp"]) dy = -1;
                if (keys["ArrowDown"]) dy = 1;

                if (dx === 0 && dy === 0) return;

                const step = keys["Shift"] ? 10 : 1;
                const nextX = hover.x + dx * step;
                const nextY = hover.y + dy * step;

                if (nextX >= 0 && nextX < img.width) {
                    hover.x = nextX;
                    view.x += dx * step;
                }
                if (nextY >= 0 && nextY < img.height) {
                    hover.y = nextY;
                    view.y += dy * step;
                }
                updatePixel();
                render();
            }

            window.addEventListener("keydown", (e) => {
                if (!loaded || document.activeElement.tagName === "INPUT")
                    return;

                // 如果按鍵已經被按住，則不重新觸發 Initial Delay
                if (keys[e.key]) return;

                keys[e.key] = true;

                if (
                    [
                        "ArrowUp",
                        "ArrowDown",
                        "ArrowLeft",
                        "ArrowRight",
                    ].includes(e.key)
                ) {
                    e.preventDefault();

                    // 1. 立即執行第一次移動 (首發)
                    movePixel();

                    // 2. 設定首發延遲 (防止輕觸誤發連動)
                    initialDelayTimer = setTimeout(() => {
                        // 3. 延遲結束後，開啟循環連發
                        if (!repeatTimer) {
                            repeatTimer = setInterval(movePixel, 120); // 這裡調整連發速度，120~150 較適中
                        }
                    }, 250); // 首發延遲 250ms
                }

                if (e.ctrlKey && e.key.toLowerCase() === "c") {
                    const text = `RGB(${color.r}, ${color.g}, ${color.b})`;
                    navigator.clipboard.writeText(text);
                }
            });

            window.addEventListener("keyup", (e) => {
                keys[e.key] = false;

                // 當所有方向鍵都放開時，清除所有計時器
                if (
                    !["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].some(
                        (k) => keys[k],
                    )
                ) {
                    clearTimeout(initialDelayTimer);
                    clearInterval(repeatTimer);
                    initialDelayTimer = null;
                    repeatTimer = null;
                }
            });
        </script>
    </body>
</html>
